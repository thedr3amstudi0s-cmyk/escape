<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESCAPE.EXE v3.0</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{
  --bk:#000;--g1:#0a1a0a;--g2:#0f2f0f;--g3:#1a4a1a;
  --g4:#226622;--g5:#2d882d;--g6:#39b039;--g7:#44cc44;
  --g8:#55ee55;--g9:#00ff41;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#000;min-height:100vh;display:flex;align-items:center;
  justify-content:center;font-family:'Press Start 2P',monospace;color:var(--g9);}
#shell{width:700px;border:4px solid var(--g6);
  box-shadow:0 0 0 2px var(--g3),0 0 40px var(--g5);background:#000;}

/* title */
#titlebar{background:var(--g3);border-bottom:4px solid var(--g6);
  display:flex;justify-content:space-between;align-items:center;padding:6px 12px;}
#titlebar .logo{font-size:8px;letter-spacing:2px;}
#timer{font-size:10px;color:var(--g8);}
#timer.warn{animation:blink .5s step-end infinite;}
@keyframes blink{50%{opacity:0;}}

/* progress */
#prog-bar{height:5px;background:var(--g2);}
#prog-fill{height:5px;background:var(--g9);width:0%;transition:width .5s;}

/* status */
#statusbar{background:var(--g1);border-bottom:2px solid var(--g3);
  display:flex;justify-content:space-between;align-items:center;padding:4px 12px;flex-wrap:wrap;gap:4px;}
#facing{font-size:7px;color:var(--g9);}
#inv-row{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.chip{background:var(--g2);border:1px solid var(--g5);color:var(--g7);font-size:5px;padding:2px 5px;}

/* viewport */
#viewport{position:relative;border-bottom:4px solid var(--g3);}
#room{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}
#viewport::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,rgba(0,0,0,.14) 3px,rgba(0,0,0,.14) 4px);}

/* narration */
#narr{background:var(--g1);border-bottom:2px solid var(--g3);
  padding:8px 12px;font-size:7px;color:var(--g7);min-height:46px;line-height:2;letter-spacing:.5px;}
#narr::before{content:'> ';color:var(--g9);}

/* INPUT OVERLAY (math puzzles, number entry) */
#input-overlay{display:none;background:var(--g1);border-bottom:2px solid var(--g3);
  padding:8px 12px;font-size:7px;color:var(--g9);min-height:46px;line-height:2;}
#input-overlay.active{display:block;}
#input-prompt{color:var(--g7);margin-bottom:4px;}
#input-field{background:var(--g2);border:2px solid var(--g6);color:var(--g9);
  font-family:'Press Start 2P',monospace;font-size:9px;padding:4px 8px;
  letter-spacing:2px;width:100%;outline:none;margin-top:4px;}

/* choices */
#choices-panel{background:#000;padding:8px 12px 10px;min-height:180px;}
#ch-header{font-size:6px;color:var(--g4);letter-spacing:2px;margin-bottom:6px;
  border-bottom:1px solid var(--g2);padding-bottom:4px;}
.opt{display:flex;align-items:flex-start;gap:8px;font-size:7px;color:var(--g5);
  padding:5px 8px;margin-bottom:4px;border:2px solid var(--g2);letter-spacing:.5px;line-height:1.8;
  cursor:default;user-select:none;}
.opt.sel{background:var(--g2);border-color:var(--g7);color:var(--g9);}
.opt.sel .arr{color:var(--g9);}
.opt.esc{border-color:var(--g9) !important;color:var(--g9) !important;animation:pulse 1s step-end infinite;}
.opt.hot{border-color:var(--g6);color:var(--g8);}
.arr{color:var(--g3);font-size:8px;flex-shrink:0;width:12px;}
.opt.sel .arr{color:var(--g9);}

/* key hints */
#keyhints{background:var(--g1);border-top:2px solid var(--g3);padding:5px 12px;
  display:flex;gap:14px;flex-wrap:wrap;}
.kh{font-size:6px;color:var(--g4);}
.kh b{color:var(--g8);border:1px solid var(--g5);padding:1px 4px;margin-right:4px;}

/* cooldown flash */
#cooldown-flash{position:fixed;top:0;left:0;width:100%;height:3px;
  background:var(--g6);opacity:0;pointer-events:none;transition:opacity .05s;}

@keyframes pulse{50%{border-color:var(--g5);color:var(--g7);}}
</style>
</head>
<body>
<div id="cooldown-flash"></div>
<div id="shell">
  <div id="titlebar">
    <div class="logo">&#9632;&#9632; ESCAPE.EXE v3.0</div>
    <div id="timer">20:00</div>
    <div class="logo">&#9632;&#9632;</div>
  </div>
  <div id="prog-bar"><div id="prog-fill"></div></div>
  <div id="statusbar">
    <span id="facing">[ NORTH WALL ]</span>
    <div id="inv-row"><span style="font-size:6px;color:var(--g4)">BAG:</span></div>
  </div>
  <div id="viewport"><canvas id="room" width="700" height="280"></canvas></div>
  <div id="narr">YOU WAKE ON A COLD FLOOR. A VAULT DOOR LOOMS NORTH. THE LIGHTS ARE OUT. THINK CAREFULLY.</div>
  <div id="input-overlay">
    <div id="input-prompt"></div>
    <input id="input-field" type="text" maxlength="20" autocomplete="off" spellcheck="false"/>
  </div>
  <div id="choices-panel">
    <div id="ch-header">[ ACTIONS ] ─────── W/S: MOVE CURSOR   SPACE: SELECT   A/D or 1-4: ROTATE</div>
    <div id="opts"></div>
  </div>
  <div id="keyhints">
    <div class="kh"><b>W</b>UP</div>
    <div class="kh"><b>S</b>DOWN</div>
    <div class="kh"><b>SPACE</b>SELECT</div>
    <div class="kh"><b>A/D</b>ROTATE</div>
    <div class="kh"><b>1-4</b>JUMP WALL</div>
  </div>
</div>
<script>
// ╔══════════════════════════════════════════════════════╗
//   ESCAPE.EXE v3.0
//   • Keyboard-driven menu (W/S/SPACE)
//   • Anti-spam: 400ms cooldown between actions
//   • Math puzzles with verified correct answers
//   • Number memorisation across walls
// ╚══════════════════════════════════════════════════════╝

const canvas=document.getElementById('room');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const W=canvas.width,H=canvas.height;

// ── COLOUR PALETTE ─────────────────────────────────────
const C={
  bk:'#000000',g1:'#0a1a0a',g2:'#0f2f0f',g3:'#1a4a1a',
  g4:'#226622',g5:'#2d882d',g6:'#39b039',g7:'#44cc44',
  g8:'#55ee55',g9:'#00ff41',
};
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(~~x,~~y,~~w,~~h);}
function pt(t,x,y,c,s=8){ctx.font=`${s}px 'Press Start 2P',monospace`;ctx.fillStyle=c;ctx.fillText(t,~~x,~~y);}
function line(x0,y0,x1,y1,c,step=3){
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),n=Math.max(dx,dy);
  for(let i=0;i<=n;i+=step){const t=i/n;px(~~(x0+(x1-x0)*t),~~(y0+(y1-y0)*t),step,step,c);}
}

// ╔══════════════════════════════════════════════════════╗
//   MATH PUZZLE SYSTEM
//   All answers are pre-computed here so there is no
//   chance of the game giving a wrong answer.
//
//   PUZZLE A  (EAST wall terminal):
//     "Circuit resistance: (17 × 4) − 33 = ?"
//      17 × 4 = 68 ;  68 − 33 = 35   → answer 35
//
//   PUZZLE B  (SOUTH safe):
//     "The safe dial code uses two clues you found:
//      Clue 1 (journal):  base = 12 × 3 = 36
//      Clue 2 (west note): offset = 36 ÷ 4 = 9
//      Final code = base + offset = 36 + 9 = 45"
//      → answer 45
//
//   PUZZLE C  (NORTH keypad):
//     "Alarm bypass: you found three room numbers
//      scratched on walls: 7, 13, 19.
//      Code = sum of all three = 7+13+19 = 39"
//      → answer 39
//
//   PUZZLE D  (WEST fuse sequence):
//     "Fuse sequence tag reads: 'Insert in order.
//      Fuse wattages: 6W, 9W, 15W.
//      Total load = 6+9+15 = 30.
//      Verify: enter total wattage."
//      → answer 30
// ╚══════════════════════════════════════════════════════╝
const PUZZLES = {
  A:{ prompt:"TERMINAL: CIRCUIT RESISTANCE = (17 x 4) - 33 = ?", answer:"35",
      hint:"17 x 4 = 68. THEN 68 - 33 = ?" },
  B:{ prompt:"SAFE CODE: BASE = 12x3. OFFSET = BASE/4. CODE = BASE+OFFSET. ENTER CODE:",
      answer:"45",
      hint:"12x3=36. 36/4=9. 36+9=45." },
  C:{ prompt:"ALARM BYPASS: ROOM NUMBERS 7, 13, 19 (scratched on walls). ENTER THEIR SUM:",
      answer:"39",
      hint:"7+13=20. 20+19=39." },
  D:{ prompt:"FUSE LOAD CHECK: 6W + 9W + 15W = TOTAL WATTAGE? ENTER IT:",
      answer:"30",
      hint:"6+9=15. 15+15=30." },
};

// ── ANTI-SPAM ───────────────────────────────────────────
const COOLDOWN_MS = 350;
let lastAction = 0;
function canAct(){
  const now=Date.now();
  if(now-lastAction<COOLDOWN_MS){
    // flash the top bar
    const f=document.getElementById('cooldown-flash');
    f.style.opacity='1';
    setTimeout(()=>f.style.opacity='0',120);
    return false;
  }
  lastAction=now;
  return true;
}

// ── MENU CURSOR ─────────────────────────────────────────
let cursor=0;
let currentOpts=[];

function renderMenu(opts){
  currentOpts=opts;
  if(cursor>=opts.length)cursor=opts.length-1;
  if(cursor<0)cursor=0;
  const el=document.getElementById('opts');
  el.innerHTML='';
  opts.forEach((o,i)=>{
    const div=document.createElement('div');
    div.className='opt'+(i===cursor?' sel':'')+(o.esc?' esc':'')+(o.hot?' hot':'');
    div.innerHTML=`<span class="arr">${i===cursor?'▶':' '}</span><span>${o.label.toUpperCase()}</span>`;
    el.appendChild(div);
  });
}

function moveCursor(dir){
  if(!canAct())return;
  cursor=((cursor+dir)+currentOpts.length)%currentOpts.length;
  renderMenu(currentOpts);
}

function selectCurrent(){
  if(!canAct())return;
  if(!currentOpts.length)return;
  const o=currentOpts[cursor];
  if(o&&o.fn) o.fn();
}

// ── INPUT OVERLAY (for puzzle answers) ──────────────────
let inputMode=false;
let inputCallback=null;
let inputAttempts=0;
const MAX_ATTEMPTS=3;

function openInput(promptTxt,cb){
  inputMode=true;
  inputCallback=cb;
  inputAttempts=0;
  document.getElementById('input-prompt').textContent=promptTxt.toUpperCase();
  document.getElementById('input-field').value='';
  document.getElementById('input-overlay').classList.add('active');
  document.getElementById('narr').style.display='none';
  setTimeout(()=>document.getElementById('input-field').focus(),50);
}

function closeInput(){
  inputMode=false;
  inputCallback=null;
  document.getElementById('input-overlay').classList.remove('active');
  document.getElementById('narr').style.display='';
}

function submitInput(){
  const val=document.getElementById('input-field').value.trim();
  if(!val)return;
  inputAttempts++;
  const result=inputCallback(val,inputAttempts);
  if(result===true){
    closeInput();
    render();
  } else {
    // wrong answer
    document.getElementById('input-field').value='';
    const penalty = inputAttempts>=MAX_ATTEMPTS ? 60 : 20;
    S.timerLeft=Math.max(0,S.timerLeft-penalty);
    narr(`WRONG. -${penalty}S PENALTY. ${result||'TRY AGAIN.'}`+(inputAttempts>=MAX_ATTEMPTS?' HINT: '+result:''));
    document.getElementById('input-field').focus();
    // after 3 wrong: show hint in prompt
    if(inputAttempts>=MAX_ATTEMPTS){
      document.getElementById('input-prompt').textContent=
        document.getElementById('input-prompt').textContent+' | HINT GIVEN';
    }
  }
}

// ── GAME STATE ──────────────────────────────────────────
const S={
  facing:0,   // 0N 1E 2S 3W
  inv:[],
  f:{},       // flags
  timerLeft:1200,
  timerOn:true,
  done:false,
  steps:0,
  uvOn:false,
  // Numbers the player must remember (shown in narration)
  // Room numbers scratched on walls (for puzzle C):
  roomNums:{north:7,east:13,south:19}, // player finds these by inspecting walls
};
const TOTAL_STEPS=32;
const WALLS=['NORTH WALL','EAST WALL','SOUTH WALL','WEST WALL'];
const ARROW=['[ ↑ N ]','[ → E ]','[ ↓ S ]','[ ← W ]'];

function narr(msg){document.getElementById('narr').textContent=msg.toUpperCase();}
function addInv(item){if(S.inv.includes(item))return;S.inv.push(item);refreshInv();}
function delInv(item){const i=S.inv.indexOf(item);if(i>-1)S.inv.splice(i,1);refreshInv();}
function hasInv(item){return S.inv.includes(item);}
function refreshInv(){
  const el=document.getElementById('inv-row');
  el.innerHTML='<span style="font-size:6px;color:var(--g4)">BAG:</span>';
  S.inv.forEach(i=>{const c=document.createElement('div');c.className='chip';c.textContent=i;el.appendChild(c);});
}
function step(){
  S.steps++;
  document.getElementById('prog-fill').style.width=Math.min(100,~~(S.steps/TOTAL_STEPS*100))+'%';
}
function go(n){
  S.facing=((n%4)+4)%4;
  cursor=0;
  render();
}

// ══════════════════════════════════════════════════════
//  PUZZLE CHAIN:
//
//  WEST  → inspect workbench → find fuse sequence note
//          → PUZZLE D: enter total wattage 30
//          → take FUSE-A, FUSE-B, FUSE-C
//          → inspect mirror → hidden UV torch slot
//          → inspect chemistry shelf → UV TORCH inside locked case
//          → PUZZLE A unlocks cabinet latch code
//            "circuit resistance (17x4)-33=35" → type 35 → cabinet opens → UV TORCH
//          → find WALL SCRATCH "19" on west wall (memorise!)
//
//  EAST  → inspect desk → screwdriver + journal
//          → journal: "base=12x3 offset=base/4 code=base+offset"
//          → use computer (needs power) → PUZZLE C hint: "check all 3 room numbers"
//          → find WALL SCRATCH "13" (memorise!)
//          → install all 3 fuses in east fuse panel → power on
//          → computer unlocks after power → shows safe instructions
//
//  SOUTH → scan bookshelf → find combo book + hidden compartment
//          → compartment: small key + map (map shows "north room # = 7")
//          → safe: PUZZLE B → enter 45 → keycard + wire cutters inside
//          → wire cutters unlock east cabinet
//          → find WALL SCRATCH "19" already noted (south confirms it)
//          → floor grate (screwdriver) → KEYCARD CHIP inside
//
//  NORTH → insert keycard → insert chip
//          → PUZZLE C: enter sum 7+13+19=39 on alarm panel
//          → PUZZLE C accepted → pull lever → ESCAPE
// ══════════════════════════════════════════════════════

// ── NORTH ACTIONS ──────────────────────────────────────
function nInspectDoor(){
  if(!S.f.nDoor){S.f.nDoor=true;step();}
  narr("VAULT DOOR: 3 stages — keycard slot, chip port, and an alarm keypad. All must clear. The number 7 is scratched on the left wall — write it down.");
  S.f.northNum=true; // player sees "7"
}
function nSlotKeycard(){
  if(!hasInv('KEYCARD')){narr("YOU NEED A KEYCARD. CHECK THE SOUTH SAFE.");return;}
  delInv('KEYCARD');S.f.keycardIn=true;step();
  narr("KEYCARD ACCEPTED. RED LIGHT TURNS AMBER. TWO LOCKS REMAIN.");render();
}
function nInsertChip(){
  if(!hasInv('CHIP')){narr("YOU NEED THE KEYCARD CHIP FROM THE SOUTH FLOOR GRATE.");return;}
  delInv('CHIP');S.f.chipIn=true;step();
  narr("CHIP SEATED. THE DOOR HUMS. ONE LOCK LEFT — THE ALARM PANEL CODE.");render();
}
function nAlarmPanel(){
  if(!S.f.keycardIn||!S.f.chipIn){narr("THE ALARM PANEL IS INACTIVE. INSERT KEYCARD AND CHIP FIRST.");return;}
  if(!S.f.powerOn){narr("NO POWER. RESTORE POWER FROM THE EAST FUSE PANEL FIRST.");return;}
  if(S.f.alarmSolved){narr("ALARM CLEARED. PULL THE LEVER.");return;}
  if(!S.f.northNum||!S.f.eastNum||!S.f.southNum){
    narr("PANEL DEMANDS A CODE. THREE NUMBERS ARE SCRATCHED ON WALLS — NORTH(7), EAST(13), SOUTH(19). FIND THEM ALL FIRST.");return;
  }
  openInput("ALARM CODE = SUM OF WALL NUMBERS 7, 13, 19. ENTER SUM:",(val,att)=>{
    if(val===PUZZLES.C.answer){
      S.f.alarmSolved=true;step();
      narr("39 ACCEPTED! ALARM CLEARED. NOW PULL THE LEVER!");
      return true;
    }
    return att>=3?PUZZLES.C.hint:'CHECK YOUR ADDITION.';
  });
}
function nPullLever(){
  if(!S.f.alarmSolved){narr("LEVER IS LOCKED. CLEAR THE ALARM PANEL FIRST.");return;}
  S.f.escaped=true;S.timerOn=false;step();
  const el=1200-S.timerLeft,m=~~(el/60),sec=el%60;
  narr(`CLUNK! ALL LOCKS DISENGAGE! THE VAULT DOOR SWINGS OPEN! YOU ESCAPED IN ${m}M ${String(sec).padStart(2,'0')}S!`);
  cursor=0;
  renderMenu([{label:'>>> WALK OUT — YOU WIN! <<<',fn:()=>{
    narr("CONGRATULATIONS. YOU SURVIVED THE ROOM.");
    renderMenu([{label:'Play Again',fn:()=>location.reload()}]);
  },esc:true}]);
}

// ── EAST ACTIONS ───────────────────────────────────────
function eInspectWall(){
  if(!S.f.eastNum){S.f.eastNum=true;step();}
  narr("SCRATCHED INTO THE EAST WALL: THE NUMBER 13. WRITE IT DOWN. YOU WILL NEED IT FOR THE ALARM CODE.");
}
function eSearchDesk(){
  if(S.f.deskDone)return narr("DESK SEARCHED. JOURNAL AND SCREWDRIVER STILL HERE IF NOT TAKEN.");
  S.f.deskDone=true;step();
  narr("UNDER STACKS OF PAPER: A LEATHER JOURNAL AND A FLATHEAD SCREWDRIVER. THE JOURNAL HAS A DOG-EARED PAGE.");
}
function eTakeJournal(){addInv('JOURNAL');S.f.hasJournal=true;step();narr("JOURNAL TAKEN. READ IT — THE SAFE FORMULA IS INSIDE.");render();}
function eTakeScrewdriver(){addInv('SCREWDRV');S.f.hasScrewdriver=true;step();narr("SCREWDRIVER TAKEN.");render();}
function eReadJournal(){
  if(!S.f.j1){
    S.f.j1=true;step();
    narr("JOURNAL P.12: 'SAFE FORMULA — BASE = 12 x 3. OFFSET = BASE / 4. CODE = BASE + OFFSET.' UNDERLINED TWICE.");
  } else if(!S.f.j2){
    S.f.j2=true;step();
    narr("JOURNAL P.31: 'FUSE PANEL IS ON THE EAST WALL. THREE FUSES RESTORE POWER. CHECK WATTAGES BEFORE INSERTING.'");
  } else {
    narr("JOURNAL: SAFE CODE FORMULA ON P.12. FUSE WARNING ON P.31. DO THE MATH YOURSELF.");
  }
}
function eFusePanel(){
  if(S.f.fusePanelDone)return narr(`FUSE PANEL: SLOTS FILLED: ${S.f.fuseA?'A':'_'} ${S.f.fuseB?'B':'_'} ${S.f.fuseC?'C':'_'}. ${S.f.powerOn?'POWER ON!':'NEED ALL THREE.'}`);
  S.f.fusePanelSeen=true;step();
  narr("EAST WALL FUSE PANEL. THREE EMPTY SLOTS LABELLED A, B, C. FIND THE THREE FUSES. FIRST VERIFY THEIR TOTAL WATTAGE.");render();
}
function eInsertFuse(name,slot){
  if(!S.f.fuseLoadVerified){
    narr("STOP. VERIFY TOTAL FUSE WATTAGE FIRST (FUSE NOTE ON WEST WORKBENCH). WRONG LOAD WILL BLOW THE PANEL.");
    return;
  }
  delInv(name);S.f[slot]=true;step();
  if(S.f.fuseA&&S.f.fuseB&&S.f.fuseC){
    S.f.powerOn=true;S.f.fusePanelDone=true;step();
    narr("ALL FUSES IN! POWER RESTORED! THE COMPUTER TERMINAL FLICKERS ON. ALSO THE VAULT DOOR SYSTEMS ACTIVATE.");
  } else {
    narr(`${name} INSERTED. ${3-[S.f.fuseA,S.f.fuseB,S.f.fuseC].filter(Boolean).length} MORE NEEDED.`);
  }
  render();
}
function eUseComputer(){
  if(!S.f.powerOn)return narr("TERMINAL IS DARK. RESTORE POWER AT THE EAST FUSE PANEL FIRST.");
  if(!S.f.pcUsed){
    S.f.pcUsed=true;step();
    narr("TERMINAL BOOTS. LOG: 'MERIDIAN CORP PANIC ROOM v3. ALARM CODE = SUM OF ROOM NUMBERS. CHECK ALL THREE WALLS.' ALSO: 'WIRE CUTTERS IN SOUTH SAFE.'");
  } else {
    narr("TERMINAL: ALARM CODE = SUM OF 3 WALL NUMBERS (SCRATCHED ON NORTH, EAST, SOUTH WALLS). WIRE CUTTERS ARE IN THE SOUTH SAFE.");
  }
}
function eInspectCabinet(){
  if(S.f.cabOpen)return narr("CABINET IS OPEN. YOU ALREADY TOOK WHAT WAS INSIDE.");
  if(!S.f.cabSeen){S.f.cabSeen=true;step();}
  narr("METAL CABINET ON EAST WALL. NEEDS WIRE CUTTERS TO SNIP THE LOCKING CABLES. GET THEM FROM THE SOUTH SAFE.");
}
function eOpenCabinet(){
  if(!hasInv('WIRE CUTS'))return narr("YOU NEED WIRE CUTTERS. THEY ARE IN THE SOUTH SAFE.");
  delInv('WIRE CUTS');S.f.cabOpen=true;step();
  narr("CABLES SNIPPED! CABINET OPEN. INSIDE: UV TORCH AND THE WEST WORKBENCH KEY.");render();
}
function eTakeUVTorch(){addInv('UV TORCH');S.f.hasUV=true;step();narr("UV TORCH TAKEN. SHINE IT ON WALLS AND OBJECTS TO REVEAL HIDDEN MARKINGS.");render();}
function eTakeWBKey(){addInv('WB KEY');S.f.hasWBKey=true;step();narr("WORKBENCH KEY TAKEN. UNLOCKS THE WEST DRAWERS.");render();}

// ── SOUTH ACTIONS ──────────────────────────────────────
function sInspectWall(){
  if(!S.f.southNum){S.f.southNum=true;step();}
  narr("SCRATCHED INTO THE SOUTH WALL BEHIND THE SHELF: 19. ALL THREE ROOM NUMBERS: NORTH=7, EAST=13, SOUTH=19. REMEMBER THEM.");
}
function sScanShelf(){
  if(S.f.shelfScanned)return narr("SHELF: THREE SYMBOL BOOKS (STAR, TRI, SQ) ON ROW 2. PULL THEM FOR THE COMPARTMENT.");
  S.f.shelfScanned=true;step();
  narr("BOOKSHELF: MOSTLY PROPS. THREE BOOKS ON ROW 2 HAVE SYMBOLS ON THEIR SPINES. SOMETHING FEELS OFF ABOUT THAT SECTION.");
}
function sUVShelf(){
  if(!hasInv('UV TORCH'))return narr("NEED A UV TORCH. GET IT FROM THE EAST CABINET AFTER OPENING WITH WIRE CUTTERS.");
  if(!S.f.uvShelf){S.f.uvShelf=true;step();}
  narr("UV LIGHT REVEALS WRITING ON WALL: 'SAFE CODE = BASE + OFFSET. CHECK JOURNAL.' AND BELOW: 'THE NUMBER IS 45.'");
  S.f.uvConfirm=true; // extra confirmation of safe answer
}
function sPullBooks(){
  if(!S.f.shelfScanned)return narr("SCAN THE SHELF FIRST.");
  if(S.f.booksPulled)return narr("COMPARTMENT IS ALREADY OPEN.");
  S.f.booksPulled=true;step();
  narr("CLICK! A HIDDEN COMPARTMENT OPENS. INSIDE: A SMALL KEY AND A FOLDED MAP.");render();
}
function sTakeKey(){addInv('SMALL KEY');S.f.hasSmallKey=true;step();narr("SMALL KEY TAKEN. FITS SOMETHING ON THE WEST WALL.");render();}
function sReadMap(){
  if(S.f.mapRead)return narr("MAP: X MARKS FLOOR GRATE SOUTH-EAST. 'CHIP IS IN THE CRAWLSPACE.' AND: 'CHECK NORTH WALL FOR THE NUMBER 7.'");
  S.f.mapRead=true;step();
  narr("MAP: AN X MARKS THE SOUTH FLOOR GRATE. HANDWRITTEN: 'CHIP IS IN THE CRAWLSPACE BELOW.' AND: 'NORTH WALL HAS A NUMBER TOO.'");
}
function sInspectSafe(){
  if(S.f.safeSeen)return narr(`WALL SAFE. 2-DIGIT CODE REQUIRED. CURRENT INPUT: ${S.f.safeInput||'NONE'}. FORMULA IN JOURNAL P.12.`);
  S.f.safeSeen=true;step();
  narr("A RECESSED WALL SAFE WITH A NUMERIC KEYPAD. A PLATE READS: 'FORMULA AUTHORISED PERSONNEL ONLY.' YOU NEED A 2-DIGIT CODE.");
}
function sTrySafe(){
  if(!S.f.safeSeen)return narr("INSPECT THE SAFE FIRST.");
  openInput("SAFE CODE (FORMULA: BASE=12x3, OFFSET=BASE/4, CODE=BASE+OFFSET):",(val,att)=>{
    S.f.safeInput=val;
    if(val===PUZZLES.B.answer){
      S.f.safeOpen=true;step();
      narr("45 CORRECT! SAFE OPEN! KEYCARD AND WIRE CUTTERS INSIDE!");
      return true;
    }
    return att>=3?PUZZLES.B.hint:'WRONG CODE. RECHECK THE JOURNAL FORMULA.';
  });
}
function sTakeKeycard(){addInv('KEYCARD');S.f.hasKeycard=true;step();narr("KEYCARD TAKEN. INSERT INTO NORTH VAULT DOOR.");render();}
function sTakeWireCuts(){addInv('WIRE CUTS');S.f.hasWireCuts=true;step();narr("WIRE CUTTERS TAKEN. USE ON EAST WALL CABINET.");render();}
function sOpenGrate(){
  if(!hasInv('SCREWDRV'))return narr("THE GRATE BOLTS NEED A SCREWDRIVER. CHECK THE EAST DESK.");
  if(S.f.grateOpen)return narr("GRATE ALREADY OPEN. CHIP WAS INSIDE.");
  S.f.grateOpen=true;step();
  narr("GRATE UNSCREWED! A CRAWLSPACE. YOU REACH IN AND PULL OUT A SMALL CIRCUIT CHIP — THE KEYCARD CHIP!");render();
}
function sTakeChip(){addInv('CHIP');S.f.hasChip=true;step();narr("CHIP TAKEN. INSERT INTO THE NORTH VAULT DOOR CHIP PORT.");render();}

// ── WEST ACTIONS ───────────────────────────────────────
function wInspectWall(){
  if(!S.f.westNum){S.f.westNum=true;}
  narr("ON THE WEST WALL NEAR THE VENT: SCRATCH MARKS. ONE SAYS '19'. THIS MATCHES THE SOUTH WALL NUMBER — BOTH CONFIRM IT.");
  // west wall also confirms south number visually
}
function wInspectBench(){
  if(S.f.benchSeen)return narr("WORKBENCH: FUSE NOTE GIVES WATTAGES. LOCKED DRAWER HAS FUSES A AND B. SMALL LOCKED BOX HAS FUSE C.");
  S.f.benchSeen=true;step();
  narr("CLUTTERED WORKBENCH. A TYPED NOTE IS TAPED DOWN. A LOCKED DRAWER. AND A SMALL LOCKED METAL BOX.");
}
function wReadFuseNote(){
  if(S.f.fuseNoteRead)return narr("FUSE NOTE: FUSE-A=6W, FUSE-B=9W, FUSE-C=15W. VERIFY TOTAL BEFORE INSERTING. DO THE MATH.");
  S.f.fuseNoteRead=true;step();
  narr("FUSE NOTE: 'FUSE-A: 6W. FUSE-B: 9W. FUSE-C: 15W. TOTAL LOAD MUST BE VERIFIED BEFORE INSERTING OR YOU WILL BLOW THE PANEL.' CALCULATE THE TOTAL.");
}
function wVerifyFuseLoad(){
  if(!S.f.fuseNoteRead)return narr("READ THE FUSE NOTE ON THE WORKBENCH FIRST.");
  if(S.f.fuseLoadVerified)return narr("LOAD ALREADY VERIFIED: 30W. SAFE TO INSERT FUSES IN EAST PANEL.");
  openInput("VERIFY TOTAL FUSE LOAD: 6W + 9W + 15W = ? (ENTER NUMBER):",(val,att)=>{
    if(val===PUZZLES.D.answer){
      S.f.fuseLoadVerified=true;step();
      narr("30W CONFIRMED. SAFE TO INSERT FUSES. NOW UNLOCK THE DRAWER AND BOX TO GET THEM.");
      return true;
    }
    return att>=3?PUZZLES.D.hint:'WRONG. ADD THE THREE WATTAGES.';
  });
}
function wOpenDrawer(){
  if(!hasInv('WB KEY')&&!hasInv('SMALL KEY')){narr("DRAWER IS LOCKED. YOU NEED A KEY. CHECK SOUTH COMPARTMENT OR EAST CABINET.");return;}
  if(S.f.drawerOpen)return narr("DRAWER ALREADY OPEN. FUSE-A AND FUSE-B INSIDE IF NOT TAKEN.");
  // small key from south OR WB key from east cabinet both work
  if(hasInv('SMALL KEY'))delInv('SMALL KEY');
  else delInv('WB KEY');
  S.f.drawerOpen=true;step();
  narr("DRAWER OPEN! FUSE-A AND FUSE-B INSIDE. ALSO A SCRAP: 'FUSE-C IS IN THE LOCKED BOX. RESISTANCE FORMULA OPENS IT.'");render();
}
function wTakeFuseA(){addInv('FUSE-A');S.f.hasFuseAItem=true;step();narr("FUSE-A (6W) TAKEN.");render();}
function wTakeFuseB(){addInv('FUSE-B');S.f.hasFuseBItem=true;step();narr("FUSE-B (9W) TAKEN.");render();}
function wInspectLockedBox(){
  if(S.f.boxOpen)return narr("BOX IS OPEN. FUSE-C WAS INSIDE.");
  if(!S.f.boxSeen){S.f.boxSeen=true;step();}
  narr("A SMALL METAL BOX WITH A 2-DIGIT COMBINATION LOCK. A LABEL: 'RESISTANCE FORMULA. (17 x 4) - 33. ENTER RESULT.'");
}
function wOpenBox(){
  if(!S.f.boxSeen)return narr("INSPECT THE LOCKED BOX FIRST.");
  openInput("BOX CODE: (17 x 4) - 33 = ? ENTER THE ANSWER:",(val,att)=>{
    if(val===PUZZLES.A.answer){
      S.f.boxOpen=true;step();
      narr("35 CORRECT! BOX OPEN! FUSE-C INSIDE!");
      return true;
    }
    return att>=3?PUZZLES.A.hint:'WRONG. REMEMBER ORDER OF OPERATIONS: MULTIPLY FIRST.';
  });
}
function wTakeFuseC(){addInv('FUSE-C');S.f.hasFuseCItem=true;step();narr("FUSE-C (15W) TAKEN. NOW HEAD TO THE EAST FUSE PANEL.");render();}
function wInspectMirror(){
  if(S.f.mirrorSeen)return narr("CRACKED MIRROR. YOUR REFLECTION LOOKS AWFUL. THE UV TORCH REVEALS SOMETHING IF YOU HAVE IT.");
  S.f.mirrorSeen=true;step();
  narr("A CRACKED MIRROR. SOMETHING FAINT IS DRAWN ON IT IN INVISIBLE INK. YOU WOULD NEED A UV TORCH TO SEE IT.");
}
function wUVMirror(){
  if(!hasInv('UV TORCH'))return narr("NO UV TORCH. GET IT FROM THE EAST CABINET.");
  if(S.f.uvMirror)return narr("UV MIRROR MESSAGE: 'CHIP IS UNDER THE SOUTH FLOOR — USE SCREWDRIVER ON GRATE.'");
  S.f.uvMirror=true;step();
  narr("UV LIGHT ON MIRROR: GLOWING TEXT — 'THE CHIP IS UNDER THE SOUTH FLOOR. UNSCREW THE FLOOR GRATE.' IMPORTANT!");
}
function wToggleUV(){
  if(!hasInv('UV TORCH'))return narr("NO UV TORCH YET.");
  S.uvOn=!S.uvOn;narr(S.uvOn?"UV TORCH ON.":"UV TORCH OFF.");render();
}

function drawBase(){
  px(0,0,W,H,C.bk);
  const wH=~~(H*.65);
  px(0,0,W,wH,'#0a160a');
  for(let y=0;y<wH;y+=8)px(0,y,W,1,'#0b1b0b');
  for(let x=0;x<W;x+=16)for(let y=wH;y<H;y+=8)
    px(x,y,16,8,((x/16+y/8)&1)?'#071207':'#050e05');
  px(0,wH-4,W,4,C.g3);px(0,wH,W,2,C.g4);
  px(0,0,W,8,C.g3);px(0,8,W,2,C.g4);
  line(0,0,80,wH,C.g2);line(W,0,W-80,wH,C.g2);
  // bulb
  if(S.f.powerOn){px(W/2-5,8,10,4,C.g7);px(W/2-9,12,18,12,C.g8);for(let i=0;i<7;i++)px(W/2-24+i*8,26,5,3,C.g3);}
  else{px(W/2-5,8,10,4,C.g3);px(W/2-9,12,18,12,C.g4);}
}

function drawNorth(){
  drawBase();const wH=~~(H*.65);
  // VAULT DOOR
  const dx=W/2-68,dy=18,dw=136,dh=wH-18;
  px(dx,dy,dw,dh,C.g2);
  for(let i=0;i<3;i++){px(dx+6,dy+18+i*46,12,12,C.g3);px(dx+dw-18,dy+18+i*46,12,12,C.g3);}
  px(dx,dy,dw,6,C.g4);px(dx,dy+dh-6,dw,6,C.g4);
  px(dx,dy,6,dh,C.g4);px(dx+dw-6,dy,6,dh,C.g4);
  px(dx+10,dy+10,dw-20,54,C.g1);px(dx+10,dy+72,dw-20,54,C.g1);
  px(dx+14,dy+14,dw-28,46,C.g2);px(dx+14,dy+76,dw-28,46,C.g2);
  // handle
  const hc=S.f.keycardIn?C.g8:C.g4;
  px(dx+dw-24,dy+dh/2-12,16,24,hc);px(dx+dw-28,dy+dh/2,12,10,hc);
  pt(S.f.escaped?'OPEN!':S.f.alarmSolved?'READY':'SEALED',dx+~~(dw/2)-32,dy+~~(dh/2)+8,S.f.escaped?C.g9:C.g5,8);

  const kr=S.f.keycardIn?C.g9:C.g4;
  px(dx-58,dy+26,44,18,C.g1);px(dx-56,dy+28,40,14,kr);
  pt('KEYCARD',dx-56,dy+56,C.g4,6);
  // CHIP PORT

  px(dx-58,dy+70,44,14,C.g1);px(dx-56,dy+72,40,10,cp);
  pt('CHIP',dx-50,dy+96,C.g4,6);
  // KEYPAD
  const kx=dx+dw+12,ky=dy+26;
  px(kx,ky,54,86,C.g1);px(kx+3,ky+3,48,80,C.g2);
  const lc=S.f.alarmSolved?C.g9:S.f.powerOn?C.g6:C.g3;
  px(kx+17,ky+8,20,12,lc);
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)px(kx+6+c*14,ky+26+r*16,12,12,C.g3);
  pt(S.f.alarmSolved?'OK':'LOCK',kx+12,ky+80,C.g5,6);
  // LEVER
  const lx=dx+dw+82,ly=dy+36;
  px(lx,ly,24,68,C.g2);px(lx+3,ly+3,18,62,C.g3);
  const lhy=S.f.alarmSolved?ly+44:ly+4;
  px(lx+8,lhy,8,24,S.f.alarmSolved?C.g9:C.g5);
  pt('LEVER',lx-2,ly+78,C.g4,6);
  // wall scratch "7"
  if(S.f.nDoor){px(dx-100,dy+100,30,30,C.g1);pt('7',dx-90,dy+124,S.f.northNum?C.g9:C.g5,16);}
}

function drawSouth(){
  drawBase();const wH=~~(H*.65);
  // BOOKSHELF
  const sx=W/2-176,sy=8,sw=274,sh=wH-14;
  px(sx,sy,sw,sh,C.g2);
  px(sx,sy,10,sh,C.g3);px(sx+sw-10,sy,10,sh,C.g3);
  px(sx,sy,sw,10,C.g3);px(sx,sy+sh-8,sw,8,C.g3);
  // UV reveal
  if(S.uvOn&&S.f.hasUV){px(sx,sy,sw,sh,'#003a0055');pt('CODE=45',sx+60,sy+~~(sh/2),C.g9,16);pt('SEE JOURNAL',sx+46,sy+~~(sh/2)+26,C.g7,7);}
  const bk=[C.g3,C.g4,C.g5,C.g2,C.g5,C.g4,C.g3];
  for(let r=0;r<4;r++){
    const ry=sy+10+r*48;px(sx+6,ry+40,sw-12,5,C.g4);
    let bx=sx+14;
    for(let b=0;b<10;b++){
      const bw=18+(b%3)*4,bh=24+(b%4)*5;if(bx+bw>sx+sw-12)break;
      const sym=r===1&&(b===2||b===5||b===8);
      const gone=sym&&S.f.booksPulled;
      if(!gone){px(bx,ry+40-bh,bw,bh,sym?C.g8:bk[(r*10+b)%bk.length]);px(bx+2,ry+40-bh+4,2,bh-8,C.g2);
        if(sym){const s=['*','^','#'];pt(s[~~(b/3)],bx+4,ry+28,C.g9,7);}}
      bx+=bw+2;
    }
  }
  // compartment
  if(S.f.booksPulled){
    px(sx+72,sy+48,110,46,C.bk);px(sx+74,sy+50,106,42,C.g1);
    if(!S.f.hasSmallKey){px(sx+88,sy+58,14,28,C.g7);px(sx+90,sy+58,10,6,C.g8);}
    if(!S.f.mapRead){px(sx+122,sy+60,32,22,C.g5);pt('MAP',sx+126,sy+76,C.g9,7);}
    pt('SECRET',sx+80,sy+104,C.g6,6);
  }
  // SAFE
  const sfx=W/2+104,sfy=36;
  px(sfx,sfy,106,110,C.g2);px(sfx+4,sfy+4,98,102,C.g1);
  px(sfx,sfy,106,8,C.g4);px(sfx,sfy,8,110,C.g4);px(sfx+98,sfy,8,110,C.g4);px(sfx,sfy+102,106,8,C.g4);
  // keypad on safe
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)px(sfx+12+c*26,sfy+18+r*20,22,16,S.f.safeOpen?C.g9:C.g3);
  if(S.f.safeOpen){
    px(sfx+8,sfy+62,90,42,C.bk);
    if(!S.f.hasKeycard)pt('CARD',sfx+10,sfy+88,C.g9,7);
    if(!S.f.hasWireCuts)pt('CUTS',sfx+56,sfy+88,C.g7,7);
    pt('OPEN!',sfx+26,sfy+108,C.g9,8);
  } else pt('SAFE',sfx+30,sfy+118,C.g4,8);
  // wall scratch "19"
  px(sx-46,sy+60,36,32,C.g1);pt('19',sx-42,sy+86,S.f.southNum?C.g9:C.g4,14);
  // FLOOR GRATE
  const grx=W/2-38,gry=wH+2;
  if(!S.f.grateOpen){px(grx,gry,76,22,C.g3);for(let i=0;i<4;i++){px(grx+4,gry+4+i*4,68,3,C.g4);}for(let i=0;i<4;i++)px(grx+4+i*18,gry+4,4,18,C.g5);}
  else{px(grx,gry,76,22,C.bk);pt('OPEN',grx+8,gry+16,C.g6,7);}
}

function drawWest(){
  drawBase();const wH=~~(H*.65);
  // WORKBENCH
  const wx=16,wy=~~(H*.46);
  px(wx,wy,214,14,C.g4);px(wx,wy+2,214,4,C.g5);
  px(wx+6,wy+14,22,wH-wy-14,C.g3);px(wx+186,wy+14,22,wH-wy-14,C.g3);
  for(let i=0;i<5;i++)px(wx+20+i*34,wy-14,16,14,C.g3);
  // fuse note
  if(!S.f.fuseNoteRead){px(wx+10,wy-36,46,28,C.g3);px(wx+12,wy-34,42,24,C.g5);pt('NOTE',wx+14,wy-16,C.g9,7);}
  // locked drawer
  px(wx+46,wy+16,114,40,C.g2);px(wx+48,wy+18,110,36,C.g1);
  if(!S.f.drawerOpen){px(wx+96,wy+30,16,14,C.g4);px(wx+98,wy+26,12,6,C.g4);px(wx+100,wy+22,8,8,C.bk);}
  else{px(wx+50,wy+20,108,32,C.bk);if(!S.f.hasFuseAItem)pt('FA',wx+60,wy+40,C.g9,7);if(!S.f.hasFuseBItem)pt('FB',wx+96,wy+40,C.g7,7);pt('OPEN',wx+130,wy+40,C.g6,7);}
  // LOCKED BOX
  const bx=wx+10,by=wy-70;
  px(bx,by,80,56,S.f.boxOpen?C.g3:C.g2);px(bx+4,by+4,72,48,C.g1);
  if(!S.f.boxOpen){
    px(bx+24,by+18,32,22,C.g3);px(bx+34,by+10,12,12,C.g3);px(bx+36,by+8,8,8,C.bk);
    pt('?',bx+10,by+42,C.g4,7);
  } else {
    px(bx+4,by+4,72,48,C.bk);
    if(!S.f.hasFuseCItem)pt('FC!',bx+22,by+34,C.g9,9);
    else pt('EMPTY',bx+6,by+34,C.g4,7);
  }
  pt('LOCK BOX',bx,by+62,C.g4,6);
  // MIRROR
  const mx=W/2-62,my=14,mw=122,mh=154;
  px(mx,my,mw,mh,C.g3);px(mx+7,my+7,mw-14,mh-14,C.g1);
  for(let i=0;i<3;i++){px(mx+i*2,my+i*2,mw-i*4,4,C.g4);px(mx+i*2,my+mh-i*4-4,mw-i*4,4,C.g4);}
  px(mx+9,my+9,mw-18,mh-18,'#031003');
  px(mx+42,my+26,26,24,C.g3);px(mx+38,my+50,36,54,C.g2);
  px(mx+34,my+104,14,32,C.g2);px(mx+56,my+104,14,32,C.g2);
  ctx.strokeStyle=C.g6;ctx.lineWidth=1;ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(mx+~~(mw*.66),my+5);ctx.lineTo(mx+mw-2,my+~~(mh*.42));ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+~~(mw*.66),my+5);ctx.lineTo(mx+~~(mw*.32),my+~~(mh*.32));ctx.stroke();
  ctx.setLineDash([]);
  if(S.uvOn&&S.f.hasUV){px(mx+9,my+9,mw-18,mh-18,'#003300aa');pt('CHIP:',mx+12,my+70,C.g9,7);pt('S.GRATE',mx+12,my+90,C.g7,7);}
  // wall scratch "19" (confirms south)
  px(W-52,120,42,30,C.g1);pt('19',W-48,144,S.f.westNum?C.g9:C.g3,13);
  // VENT
  const vx=W/2+96,vy=~~(H*.33);
  px(vx,vy,96,76,C.g1);px(vx+3,vy+3,90,70,C.g2);
  for(let i=0;i<7;i++)px(vx+6,vy+6+i*9,84,6,C.g3);
  for(let j=0;j<4;j++)px(vx+6+j*22,vy+6,6,62,C.g4);
  pt('VENT',vx+30,vy+84,C.g4,8);
}

// ── MAIN RENDER ────────────────────────────────────────
function render(){
  const k=['north','east','south','west'][S.facing];
  document.getElementById('facing').textContent=`[ ${WALLS[S.facing]} ]`;
  ctx.clearRect(0,0,W,H);
  if(k==='north')drawNorth();
  else if(k==='east')drawEast();
  else if(k==='south')drawSouth();
  else drawWest();
  const opts=SCENES[k].opts();
  cursor=Math.min(cursor,Math.max(0,opts.length-1));
  renderMenu(opts);
}

// ── KEYBOARD HANDLER ───────────────────────────────────
document.addEventListener('keydown',e=>{
  // In input mode: only handle Enter (submit) and Escape (cancel)
  if(inputMode){
    if(e.key==='Enter'){e.preventDefault();submitInput();}
    if(e.key==='Escape'){e.preventDefault();closeInput();narr("INPUT CANCELLED.");render();}
    return; // let all other keys through to the input field
  }

  if(S.done)return;
  const k=e.key;

  // Rotation — no cooldown for rotation (doesn't affect puzzle state)
  if(k==='a'||k==='A'){cursor=0;go(S.facing-1);return;}
  if(k==='d'||k==='D'){cursor=0;go(S.facing+1);return;}
  if(k==='1'){cursor=0;go(0);return;}
  if(k==='2'){cursor=0;go(1);return;}
  if(k==='3'){cursor=0;go(2);return;}
  if(k==='4'){cursor=0;go(3);return;}

  // Menu navigation — COOLDOWN ENFORCED
  if(k==='w'||k==='W'){e.preventDefault();moveCursor(-1);}
  if(k==='s'||k==='S'){e.preventDefault();moveCursor(1);}
  if(k===' '){e.preventDefault();if(canAct())selectCurrent();}
});

// ── TIMER ──────────────────────────────────────────────
const timerEl=document.getElementById('timer');
setInterval(()=>{
  if(!S.timerOn)return;
  S.timerLeft--;
  if(S.timerLeft<=0){
    S.timerOn=false;S.done=true;
    narr("TIME'S UP. THE ROOM WINS. TRY AGAIN.");
    renderMenu([{label:'Play Again',fn:()=>location.reload()}]);
    return;
  }
  const m=~~(S.timerLeft/60),sec=S.timerLeft%60;
  timerEl.textContent=`${m}:${String(sec).padStart(2,'0')}`;
  if(S.timerLeft<=60)timerEl.className='warn';
  else if(S.timerLeft<=180)timerEl.style.color='var(--g6)';
},1000);

// ── BOOT ───────────────────────────────────────────────
render();
narr("YOU WAKE ON A COLD FLOOR. A VAULT DOOR IS SEALED NORTH. POWER IS OUT. FOUR MATH PUZZLES STAND BETWEEN YOU AND FREEDOM. USE W/S TO NAVIGATE, SPACE TO ACT.");
</script>
